name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Build index
      run: npm run index
      env:
        # GitHub Actions have limited memory files to test with
        # In production, this would access user's ~/.openclaw/workspace
        NODE_ENV: ci
        
    - name: Run tests
      run: npm test
      
    - name: Upload coverage
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: index-artifact
        path: index.json
        retention-days: 7
        
  security-audit:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Run npm audit
      run: npm audit --audit-level=moderate
      
    - name: Check for secrets
      run: |
        if grep -r "GITHUB_TOKEN\|API_KEY\|SECRET" . --exclude-dir=node_modules --exclude-dir=.git; then
          echo "Potential secrets found!";
          exit 1;
        fi
        echo "No secrets detected"
